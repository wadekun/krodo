name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Only one CI run per branch — newer pushes cancel older in-flight runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-type-test:
    name: Lint, type-check, test (Python ${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-groups --frozen

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type check (mypy --strict)
        run: uv run mypy src

      - name: Run tests with coverage
        run: uv run pytest --cov-report=xml

      - name: Upload coverage artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/
          if-no-files-found: ignore
          retention-days: 14

  # Provider matrix — real LLM e2e regression (Phase 2 M8).
  #
  # Non-blocking: continue-on-error means a flaky API / quota / network
  # issue never blocks merge. Steps auto-skip (exit 0) when the
  # corresponding secret is unset, so this job is safe to land before any
  # provider keys are configured. Once secrets are added in repo settings,
  # the job starts running for real with zero code changes.
  #
  # Ollama is intentionally deferred — needs docker + model pull, heavier
  # than this smoke-test scope. Will land in a follow-up.
  provider_matrix:
    name: Provider e2e (${{ matrix.provider }})
    needs: lint-type-test
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        provider: [anthropic, openai, gemini]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-groups --frozen

      - name: Run ${{ matrix.provider }} e2e
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: uv run python .github/workflows/scripts/provider_e2e.py ${{ matrix.provider }}
